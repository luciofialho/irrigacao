; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
; dicas em
; https://diyprojects.io/esp8266-upload-data-folder-spiffs-littlefs-platformio/#.YOWyXTOSmUk

[platformio]
;lib_dir = a:\Dropbox\Arduino\Sketches\libraries
;src_dir = .
build_dir = c:\ArduinoCompile\master-irrig

[env:Master]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
	paulstoffregen/OneWire@^2.3.7
	milesburton/DallasTemperature@^3.11.0
	marian-craciunescu/ESP32Ping@^1.7
	adafruit/Adafruit GFX Library@^1.11.7
  esphome/ESPAsyncWebServer-esphome@^3.2.2
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv
lib_ignore = Ethernet(esp8266)
;lib_ignore = ESPAsyncWebServer, ESPAsyncTCP, RPAsyncTCP, AsyncTCP



